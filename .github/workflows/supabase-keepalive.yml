# Supabase 無料枠の自動停止（7日間アクセスなし）対策
# GitHub → Settings → Secrets and variables → Actions:
#   SUPABASE_URL        … https://safwaqsrvvwgnmsazrjm.supabase.co
#   SUPABASE_ANON_KEY   … anon / publishable key

name: Supabase Keep-Alive

on:
  schedule:
    # 毎日 03:00 UTC（12:00 JST）
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL と SUPABASE_ANON_KEY を Secrets に登録してください。"
            exit 1
          fi

          URL=$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]' | sed 's|/$||')
          KEY=$(printf '%s' "$SUPABASE_ANON_KEY" | tr -d '[:space:]')

          if [[ ! "$URL" =~ ^https:// ]]; then
            echo "::error::SUPABASE_URL は https:// で始まる必要があります。"
            exit 1
          fi

          echo "Ping: ${URL}/rest/v1/"

          HTTP=$(curl -sS -o /tmp/supabase-ping.txt -w "%{http_code}" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}" \
            "${URL}/rest/v1/" || echo "000")

          echo "HTTP status: ${HTTP}"

          if [ "$HTTP" = "000" ]; then
            echo "::error::Supabase に接続できませんでした。"
            exit 1
          fi

          echo "Supabase keep-alive OK"
